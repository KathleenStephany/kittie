<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maíz Criollo Pixel</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#0a0014;
  color:white;
  font-family:'VT323', monospace;
}

h1{
  text-align:center;
  font-family:'Press Start 2P';
  font-size:14px;
  margin-top:25px;
}

.wrap{
  display:flex;
  justify-content:center;
  margin-top:20px;
}

canvas{
  width:90%;
  height:540px;
  border-radius:12px;
  background:radial-gradient(circle at 50% 35%, rgba(255,77,216,0.18), rgba(0,0,0,0.25));
}

.btns{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:25px 0;
}

button{
  background:#ff4dd8;
  border:none;
  padding:10px 20px;
  font-family:'Press Start 2P';
  font-size:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>MAÍZ CRIOLLO // ANTOCIANINAS</h1>

<div class="wrap">
  <canvas id="maizCanvas"></canvas>
</div>

<div class="btns">
  <button id="btnDemo">Demo</button>
  <button id="btnRespawn">Re-sembrar</button>
</div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const canvas = document.getElementById("maizCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener("resize", resize);

let sequence = randomDNA(10000);
let seqOffset = 0;

function randomDNA(n){
  const b=["A","C","G","T"];
  let s="";
  for(let i=0;i<n;i++) s+=b[(Math.random()*4)|0];
  return s;
}

const SPRITE = [
"00000000000041111110000000000000",
"00000000000154544451100000000000",
"00000000001444454454410000000000",
"00000000115555555555551100000000",
"00000000115444454454451100000000",
"00000000014454445445455510000000",
"00000000015555555555555510000000",
"01111114444445445445554111111400",
"13333331555555555555551333333310",
"43333331555555555555551333333320",
"01123331445445445445551333211400",
"00013333333154544451133333310000",
"00013333333321555133333333310000",
"00001133333331133333333333310000",
"00000011111111111111111111100000",
"00000000000111111111000000000000",
"00000000000111111111000000000000",
"00000000000011111100000000000000"
];

const COLORS = {
1:"#000000",
2:"#5c7a2f",
3:"#7fb047",
4:"#f6d54a",
5:"#e1aa1f"
};

function shade(hex, amt){
  const h=hex.replace("#","");
  const r=Math.max(0,Math.min(255,parseInt(h.substring(0,2),16)+amt));
  const g=Math.max(0,Math.min(255,parseInt(h.substring(2,4),16)+amt));
  const b=Math.max(0,Math.min(255,parseInt(h.substring(4,6),16)+amt));
  return `rgb(${r},${g},${b})`;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const rows=SPRITE.length;
  const cols=SPRITE[0].length;

  const maxW=canvas.width*0.7;
  const maxH=canvas.height*0.7;

  const cell=Math.floor(Math.min(maxW/cols,maxH/rows));

  const startX=Math.floor((canvas.width-cols*cell)/2);
  const startY=Math.floor((canvas.height-rows*cell)/2);

  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.font=`${Math.floor(cell*0.85)}px VT323`;

  let k=0;

  for(let y=0;y<rows;y++){
    const row=SPRITE[y];
    for(let x=0;x<cols;x++){
      const code=row.charCodeAt(x)-48;
      if(code===0) continue;

      const px=startX+x*cell;
      const py=startY+y*cell;

      const base=COLORS[code];

      ctx.fillStyle=base;
      ctx.fillRect(px,py,cell,cell);

      const ch=sequence[(seqOffset+k)%sequence.length];

      const letterColor = (code===1) ? "rgba(240,240,255,0.85)" : shade(base,-70);

      ctx.fillStyle=letterColor;
      ctx.fillText(ch,px+cell/2,py+cell/2);

      k++;
    }
  }
}

draw();

document.getElementById("btnDemo").addEventListener("click",()=>{
  sequence=randomDNA(10000);
  draw();
});

document.getElementById("btnRespawn").addEventListener("click",()=>{
  seqOffset=(seqOffset+97)%sequence.length;
  draw();
});

});
</script>

</body>
</html>
