<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maíz criollo vivo</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      background:#0a0014;
      color:#fff;
      font-family:'VT323', monospace;
    }

    h1{
      text-align:center;
      margin-top:30px;
      font-family:'Press Start 2P', cursive;
      font-size:14px;
    }

    .wrap{
      width:100%;
      display:flex;
      justify-content:center;
      margin-top:20px;
    }

    canvas{
      width:90%;
      height:520px;
      background:radial-gradient(circle at 50% 35%, rgba(255,77,216,0.18), rgba(0,0,0,0.2));
      border-radius:12px;
    }

    .btns{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    button{
      background:#ff4dd8;
      border:none;
      padding:10px 20px;
      font-family:'Press Start 2P';
      font-size:10px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>MAÍZ CRIOLLO // ANTOCIANINAS</h1>

<div class="wrap">
  <canvas id="maizCanvas"></canvas>
</div>

<div class="btns">
  <button id="btnDemo">Demo</button>
  <button id="btnRespawn">Re-sembrar</button>
</div>

<script>
const canvas = document.getElementById("maizCanvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
resize();
window.addEventListener("resize", resize);

let pixel = 14;
let sequence = randomDNA(8000);
let colorSeed = 1;
let paletteIndex = 0;

const PALETTES = [
  ["#ff4dd8","#ef4444","#7c3aed","#a855f7"], // mix
  ["#7c3aed","#6d28d9","#a855f7","#4c1d95"], // morado
  ["#ef4444","#dc2626","#fb7185","#7f1d1d"], // rojo
  ["#ff4dd8","#f472b6","#fb7185","#a31977"]  // rosa
];

function randomDNA(n){
  const b=["A","C","G","T"];
  let s="";
  for(let i=0;i<n;i++) s+=b[(Math.random()*4)|0];
  return s;
}

function inCob(nx, ny){
  const y=(ny+1)/2;
  const bulge=Math.sin(Math.PI*Math.min(1,y*1.02));
  const taper=1-Math.max(0,(y-0.78)/0.22);
  const halfW=0.18+0.62*bulge*(0.65+0.35*(1-y));
  return Math.abs(nx)<=halfW*(0.55+0.45*taper);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cols=Math.floor(canvas.width/pixel);
  const rows=Math.floor(canvas.height/pixel);

  const cobCols=Math.floor(cols*0.38);
  const cobRows=Math.floor(rows*0.78);

  const startX=Math.floor((cols-cobCols)/2);
  const startY=Math.floor((rows-cobRows)/2);

  let idx=0;

  for(let gy=0;gy<cobRows;gy++){
    for(let gx=0;gx<cobCols;gx++){

      const nx=(gx/(cobCols-1))*2-1;
      const ny=(gy/(cobRows-1))*2-1;

      if(!inCob(nx,ny)) continue;

      const x=(startX+gx)*pixel;
      const y=(startY+gy)*pixel;

      const ch=sequence[idx%sequence.length];
      const pal=PALETTES[paletteIndex];
      const color=pal[(gx+gy+colorSeed)%pal.length];

      ctx.fillStyle=color;
      ctx.fillRect(x,y,pixel,pixel);

      ctx.fillStyle=color;
      ctx.font=`${pixel}px VT323`;
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText(ch,x+pixel/2,y+pixel/2);

      idx++;
    }
  }
}

draw();

document.getElementById("btnDemo").addEventListener("click",()=>{
  sequence=randomDNA(8000);
  draw();
});

document.getElementById("btnRespawn").addEventListener("click",()=>{
  colorSeed++;
  draw();
});

canvas.addEventListener("dblclick",()=>{
  paletteIndex=(paletteIndex+1)%PALETTES.length;
  draw();
});
</script>

</body>
</html>
