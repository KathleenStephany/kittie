<script>
  const canvas = document.getElementById("maizCanvas");
  const ctx = canvas.getContext("2d");

  function resize() {
    // canvas real = tamaño CSS (simple)
    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  resize();
  window.addEventListener("resize", () => {
    resize();
    draw();
  });

  // ======== SECUENCIA (para letras A/C/G/T) ========
  let sequence = randomDNA(9000);
  function randomDNA(n) {
    const b = ["A","C","G","T"];
    let s = "";
    for (let i = 0; i < n; i++) s += b[(Math.random() * 4) | 0];
    return s;
  }

  // ======== SPRITE (32 x 33) ========
  // 0 = transparente
  // 1 = negro (contorno)
  // 2 = verde oscuro (sombra hoja)
  // 3 = verde claro (hoja)
  // 4 = amarillo (grano)
  // 5 = amarillo fuerte / naranja (sombra grano)
  const SPRITE = [
    "00000000000041111110000000000000",
    "00000000000154544451100000000000",
    "00000000000154544451100000000000",
    "00000000001444454454410000000000",
    "00000000115555555555551100000000",
    "00000000115555555555551100000000",
    "00000000115444454454451100000000",
    "00000000014454445445455510000000",
    "00000000014454445445455510000000",
    "00000000014454445445455510000000",
    "00000000015555555555555510000000",
    "00000000015444454454455410000000",
    "00000000015444454454455410000000",
    "00000000015444454454455410000000",
    "01111114444445445445554111111400",
    "13333331555555555555551333333310",
    "43333331555555555555551333333320",
    "01123331445445445445551333211400",
    "00013333111444454441133333100000",
    "00013333333154544451133333310000",
    "00013333333154544451133333310000",
    "00013333333321555133333333310000",
    "00001133333311111133333333110000",
    "00001133333331133333333333310000",
    "00001133333331133333333333310000",
    "00000011111111111111111111100000",
    "00000000000111111111000000000000",
    "00000000000111111111000000000000",
    "00000000000111111111000000000000",
    "00000000000111111111000000000000",
    "00000000000111111111000000000000",
    "00000000000011111100000000000000",
    "00000000000000000000000000000000"
  ];

  // Colores “exactos estilo sprite”
  const COLORS = {
    1: "#000000", // outline
    2: "#5c7a2f", // verde oscuro
    3: "#7fb047", // verde claro
    4: "#f6d54a", // amarillo grano
    5: "#e1aa1f"  // amarillo fuerte / sombra
  };

  // Para que la letra se “sombrée” en relación al pixel
  function shade(hex, amt) {
    // amt: -60..+60 aprox
    const h = hex.replace("#","");
    const r = Math.max(0, Math.min(255, parseInt(h.substring(0,2),16) + amt));
    const g = Math.max(0, Math.min(255, parseInt(h.substring(2,4),16) + amt));
    const b = Math.max(0, Math.min(255, parseInt(h.substring(4,6),16) + amt));
    return `rgb(${r},${g},${b})`;
  }

  // Botones
  const btnDemo = document.getElementById("btnDemo");
  const btnRespawn = document.getElementById("btnRespawn");

  btnDemo.addEventListener("click", () => {
    sequence = randomDNA(9000);
    draw();
  });

  btnRespawn.addEventListener("click", () => {
    // re-sembrar = mover el offset para que cambien letras (misma secuencia)
    seqOffset = (seqOffset + 97) % sequence.length;
    draw();
  });

  // Offset para variar letras
  let seqOffset = 0;

  // Hover (opcional): resalta el pixel bajo el mouse
  let hoverCell = null;
  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    hoverCell = { mx, my };
  });
  canvas.addEventListener("mouseleave", () => hoverCell = null);

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Fondo
    const bg = ctx.createRadialGradient(
      canvas.width*0.5, canvas.height*0.35, 20,
      canvas.width*0.5, canvas.height*0.35, canvas.width*0.8
    );
    bg.addColorStop(0, "rgba(255,77,216,0.18)");
    bg.addColorStop(1, "rgba(0,0,0,0.25)");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // HUD
    ctx.save();
    ctx.font = "14px 'Press Start 2P'";
    ctx.fillStyle = "rgba(244,233,255,0.9)";
    ctx.fillText("MAÍZ CRIOLLO // ANTOCIANINAS", 18, 34);
    ctx.restore();

    const rows = SPRITE.length;
    const cols = SPRITE[0].length;

    // tamaño del pixel en pantalla (auto)
    const maxW = canvas.width * 0.72;
    const maxH = canvas.height * 0.72;
    const cell = Math.floor(Math.min(maxW / cols, maxH / rows));
    const startX = Math.floor((canvas.width - cols * cell) / 2);
    const startY = Math.floor((canvas.height - rows * cell) / 2) + 10;

    // letra centrada
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `${Math.floor(cell * 0.90)}px VT323`;

    let k = 0;

    // para hover: detectar celda
    let hx = -1, hy = -1;
    if (hoverCell) {
      hx = Math.floor((hoverCell.mx - startX) / cell);
      hy = Math.floor((hoverCell.my - startY) / cell);
    }

    for (let y=0; y<rows; y++) {
      const row = SPRITE[y];
      for (let x=0; x<cols; x++) {
        const code = row.charCodeAt(x) - 48; // '0'..'5'
        if (code === 0) continue;

        const px = startX + x * cell;
        const py = startY + y * cell;

        const base = COLORS[code];

        // fondo del cuadrito
        ctx.fillStyle = base;
        ctx.fillRect(px, py, cell, cell);

        // letra A/C/G/T
        const ch = sequence[(seqOffset + k) % sequence.length];

        // “sombra” de letra: más oscura sobre amarillo/verde; más clara sobre negro
        const letterColor = (code === 1) ? "rgba(240,240,255,0.80)" : shade(base, -70);

        // si hover, ilumina
        const isHover = (x === hx && y === hy);
        if (isHover) {
          ctx.save();
          ctx.globalAlpha = 0.22;
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(px, py, cell, cell);
          ctx.restore();
          ctx.shadowColor = "rgba(255,77,216,0.65)";
          ctx.shadowBlur = 12;
        } else {
          ctx.shadowColor = "rgba(0,0,0,0.25)";
          ctx.shadowBlur = 2;
        }

        ctx.fillStyle = letterColor;
        ctx.fillText(ch, px + cell/2, py + cell/2);

        k++;
      }
    }
  }

  // loop suave (para que el hover se vea inmediato)
  function loop(){
    draw();
    requestAnimationFrame(loop);
  }
  loop();
</script>
