<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maíz criollo vivo — Kittie.exe</title>

  <!-- Fuentes pixel / retro -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/kittie/styles/main.css" />

  <style>
    .panel {
      max-width: 980px;
      margin: 2rem auto;
      padding: 1.5rem;
    }

    .panel__header h2 {
      margin: 0 0 0.4rem 0;
    }

    .tool-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
    }

    .pixel-btn {
      font-family: var(--font-main);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.7rem 1.2rem;
      border: 3px solid #000;
      border-radius: 10px;
      background: linear-gradient(#ff4dd8, #a31977);
      color: #ffeefc;
      text-shadow: 1px 1px #000;
      box-shadow: 0 3px 0 #000, 0 0 0 2px #fff inset;
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
      user-select: none;
    }
    .pixel-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #000, 0 0 0 2px #fff inset;
    }

    .hint {
      font-family: var(--font-body);
      opacity: 0.9;
      font-size: 1.05rem;
      margin: 0.4rem 0 0 0;
    }

    .canvas-wrap {
      margin-top: 1.2rem;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 0 18px rgba(255, 77, 216, 0.28), inset 0 0 12px rgba(255, 77, 216, 0.15);
      position: relative;
    }

    canvas#maizCanvas {
      width: 100%;
      height: 520px;
      display: block;
      border-radius: 10px;
      background: radial-gradient(circle at 50% 35%, rgba(255,77,216,0.18), rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.35));
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      pointer-events: none;
      transform: translate(12px, 12px);
      background: rgba(0,0,0,0.88);
      border: 2px solid rgba(255,77,216,0.6);
      color: #f4e9ff;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      box-shadow: 0 0 16px rgba(255,77,216,0.25);
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.25;
      max-width: 320px;
      display: none;
      z-index: 5;
    }

    .tooltip b { color: var(--accent); }

    .filebox {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    input[type="file"]{
      font-family: var(--font-body);
      color: #f4e9ff;
    }

    @media (max-width: 600px) {
      canvas#maizCanvas { height: 440px; }
      .pixel-btn { font-size: 0.55rem; padding: 0.6rem 0.9rem; }
    }
  </style>
</head>

<body>
  <canvas class="scanline" aria-hidden="true"></canvas>

  <header class="hero">
    <div class="hero__content">
      <p class="hero__tag">&gt; maíz criollo vivo</p>
      <h1 class="hero__title">Genoma en mazorca</h1>
      <div class="hero__nav">
        <a href="index.html#inicio" class="a--back boton-sonido">Volver al inicio</a>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel__header">
        <h2 id="title">SRR35792142 — Maíz (México)</h2>
        <p class="hint" id="subtitle">Pasa el mouse sobre una letra para ver info. Haz click para “fijar” el tooltip.</p>
      </div>

      <div class="tool-row">
        <div class="filebox">
          <span class="hint">Cargar FASTQ (demo local):</span>
          <input id="fastqInput" type="file" accept=".fastq,.fq,.txt" />
          <button class="pixel-btn boton-sonido" id="btnDemo">Demo (secuencia fake)</button>
        </div>
        <button class="pixel-btn boton-sonido" id="btnRespawn">Re-sembrar mazorca</button>
      </div>

      <div class="canvas-wrap" id="wrap">
        <canvas id="maizCanvas"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>
    </section>
  </main>

  <script>
    // =========================
    // 0) Metadata base del dataset (edítalo a tu gusto)
    // =========================
    const MAIZ_META = {
      accession: "SRR35792142",
      especie: "Zea mays",
      pais: "México",
      nota: "Lecturas FASTQ (SRA). Visualización artística: bases nucleicas formando mazorca."
    };

    // =========================
    // 1) Canvas setup
    // =========================
    const canvas = document.getElementById("maizCanvas");
    const wrap = document.getElementById("wrap");
    const tooltip = document.getElementById("tooltip");
    const ctx = canvas.getContext("2d");

    function resizeCanvasToCSS() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", () => {
      resizeCanvasToCSS();
      buildMaizLayout();
      render();
    });

    // =========================
    // 2) Generación de “kernels” (letras) en forma de mazorca
    //    Guardamos bounding boxes para hover
    // =========================
    let sequence = "";          // cadena A/C/G/T
    let kernels = [];           // {x,y,ch,idx,w,h,meta}
    let hovered = null;         // kernel hovered
    let pinned = false;         // tooltip fijo por click

    function randomDNA(n) {
      const b = ["A","C","G","T"];
      let s = "";
      for (let i=0;i<n;i++) s += b[(Math.random()*4)|0];
      return s;
    }

    // Silueta: una elipse (mazorca) + rejilla de puntos adentro
    function buildMaizLayout() {
      kernels = [];

      const W = canvas.getBoundingClientRect().width;
      const H = canvas.getBoundingClientRect().height;

      // centro y tamaño de mazorca
      const cx = W * 0.52;
      const cy = H * 0.50;
      const a = W * 0.20;   // radio x
      const b = H * 0.34;   // radio y

      // densidad de letras
      const stepX = Math.max(14, Math.floor(W / 55));  // px entre letras
      const stepY = Math.max(18, Math.floor(H / 28));

      ctx.font = "18px VT323";
      const fontSize = 18; // para bbox aproximado
      const charW = 10;    // VT323 ~ ancho aprox por char

      // Kernels: puntos dentro de la elipse
      let idx = 0;
      for (let y = cy - b; y <= cy + b; y += stepY) {
        // ancho disponible en esta fila (elipse)
        const dy = (y - cy) / b;
        const rowHalf = a * Math.sqrt(Math.max(0, 1 - dy*dy));
        const xStart = cx - rowHalf;
        const xEnd   = cx + rowHalf;

        // “zigzag” tipo granos
        const offset = ((Math.floor((y - (cy - b)) / stepY)) % 2) * (stepX / 2);

        for (let x = xStart + offset; x <= xEnd; x += stepX) {
          const ch = sequence[idx % sequence.length] || "A";

          // meta por kernel (puedes enriquecer)
          const meta = {
            ...MAIZ_META,
            base: ch,
            pos: idx + 1,
            // quality: (si la tienes)
            // read: (si rastreas el read)
          };

          kernels.push({
            x, y,
            ch,
            idx,
            w: charW,
            h: fontSize,
            meta
          });

          idx++;
          if (idx > 2500) break; // límite visual (evita saturar)
        }
        if (idx > 2500) break;
      }
    }

    // =========================
    // 3) Render
    // =========================
    function drawBackground(W, H) {
      // brillo suave
      ctx.save();
      ctx.globalAlpha = 0.8;
      ctx.fillStyle = "rgba(0,0,0,0.10)";
      ctx.fillRect(0,0,W,H);

      // “tallo” simple (retro)
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = "rgba(64,211,90,0.25)";
      ctx.fillRect(W*0.48, H*0.78, W*0.08, H*0.18);
      ctx.restore();
    }

    function render() {
      const W = canvas.getBoundingClientRect().width;
      const H = canvas.getBoundingClientRect().height;

      ctx.clearRect(0,0,W,H);
      drawBackground(W, H);

      // título mini HUD
      ctx.save();
      ctx.font = "16px 'Press Start 2P'";
      ctx.fillStyle = "rgba(244,233,255,0.85)";
      ctx.fillText("MAÍZ CRIOLLO // ADN", 18, 34);
      ctx.restore();

      // kernels
      ctx.save();
      ctx.font = "18px VT323";

      for (const k of kernels) {
        const isHover = hovered && hovered.idx === k.idx;

        // color: base -> acento / blanco
        // (sin hardcode de paleta complicada para que se sienta “neón” por el CSS general)
        ctx.fillStyle = isHover ? "rgba(255,77,216,1)" : "rgba(244,233,255,0.9)";

        // glow sutil
        if (isHover) {
          ctx.shadowColor = "rgba(255,77,216,0.8)";
          ctx.shadowBlur = 10;
        } else {
          ctx.shadowColor = "rgba(255,77,216,0.25)";
          ctx.shadowBlur = 2;
        }

        // “respirar” un poco (animación leve)
        const t = performance.now() * 0.001;
        const wobble = 1.2 * Math.sin(t + k.idx * 0.02);

        ctx.fillText(k.ch, k.x, k.y + wobble);
      }

      ctx.restore();
    }

    // =========================
    // 4) Hover detection + tooltip
    // =========================
    function getMousePos(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: evt.clientX - rect.left,
        y: evt.clientY - rect.top
      };
    }

    function hitTest(mx, my) {
      // búsqueda rápida: checar cerca (sin estructura espacial por simplicidad)
      // Si luego quieres ultra fluido, hacemos grid indexing.
      let best = null;
      let bestD = Infinity;

      for (const k of kernels) {
        const dx = mx - k.x;
        const dy = my - k.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < bestD && d2 < 140) { // radio de selección
          bestD = d2;
          best = k;
        }
      }
      return best;
    }

    function showTooltip(k, evt) {
      const m = k.meta;
      tooltip.innerHTML = `
        <div><b>${m.base}</b> <span style="opacity:.85">pos ${m.pos}</span></div>
        <div style="margin-top:.35rem; opacity:.95">
          <div><b>Accession:</b> ${m.accession}</div>
          <div><b>Especie:</b> ${m.especie}</div>
          <div><b>País:</b> ${m.pais}</div>
        </div>
        <div style="margin-top:.35rem; opacity:.8">${m.nota}</div>
      `;

      tooltip.style.display = "block";

      // posicionar relativo al contenedor
      const wrapRect = wrap.getBoundingClientRect();
      tooltip.style.left = (evt.clientX - wrapRect.left) + "px";
      tooltip.style.top  = (evt.clientY - wrapRect.top) + "px";
    }

    function hideTooltip() {
      tooltip.style.display = "none";
    }

    canvas.addEventListener("mousemove", (evt) => {
      if (pinned) {
        // si está fijado, solo movemos el tooltip con el mouse si quieres:
        const wrapRect = wrap.getBoundingClientRect();
        tooltip.style.left = (evt.clientX - wrapRect.left) + "px";
        tooltip.style.top  = (evt.clientY - wrapRect.top) + "px";
        return;
      }

      const {x,y} = getMousePos(evt);
      const k = hitTest(x,y);

      hovered = k;
      render();

      if (k) showTooltip(k, evt);
      else hideTooltip();
    });

    canvas.addEventListener("mouseleave", () => {
      if (!pinned) hideTooltip();
      hovered = null;
      render();
    });

    canvas.addEventListener("click", (evt) => {
      if (!hovered) return;
      pinned = !pinned;
      if (pinned) showTooltip(hovered, evt);
    });

    // =========================
    // 5) Anim loop
    // =========================
    function loop() {
      render();
      requestAnimationFrame(loop);
    }

    // =========================
    // 6) Cargar secuencia desde FASTQ (demo local) o usar demo
    // =========================
    function parseFastqFirstN(text, maxReads=200, maxBases=2500) {
      // FASTQ: 4 líneas por read
      // 1: @id
      // 2: SEQ
      // 3: +
      // 4: QUAL
      const lines = text.split(/\r?\n/);
      let seq = "";
      let reads = 0;

      for (let i=0; i+3 < lines.length; i+=4) {
        const s = (lines[i+1] || "").trim();
        if (!s) continue;
        seq += s;
        reads++;
        if (reads >= maxReads) break;
        if (seq.length >= maxBases) break;
      }

      // filtrar solo A/C/G/T/N -> aquí quitamos N para el arte
      seq = seq.toUpperCase().replace(/[^ACGT]/g, "");
      if (seq.length < 100) seq = randomDNA(1200);
      return seq.slice(0, maxBases);
    }

    const fastqInput = document.getElementById("fastqInput");
    fastqInput.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      // Leemos solo un pedazo del archivo para no matar el navegador
      const chunk = file.slice(0, 2_000_000); // 2MB
      const text = await chunk.text();

      sequence = parseFastqFirstN(text, 250, 2600);
      resizeCanvasToCSS();
      buildMaizLayout();
      pinned = false;
      hideTooltip();
      hovered = null;
      render();
    });

    document.getElementById("btnDemo").addEventListener("click", () => {
      sequence = randomDNA(2600);
      resizeCanvasToCSS();
      buildMaizLayout();
      pinned = false;
      hideTooltip();
      hovered = null;
      render();
    });

    document.getElementById("btnRespawn").addEventListener("click", () => {
      // re-ordena la “siembra” sin cambiar secuencia
      if (!sequence) sequence = randomDNA(2600);
      buildMaizLayout();
      pinned = false;
      hideTooltip();
      hovered = null;
      render();
    });

    // =========================
    // init
    // =========================
    sequence = randomDNA(2600);
    resizeCanvasToCSS();
    buildMaizLayout();
    loop();
  </script>

  <script src="/kittie/scripts/sonidos.js"></script>
</body>
</html>
