<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maíz criollo vivo — Kittie.exe</title>

  <!-- Fuentes pixel / retro -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/kittie/styles/main.css" />

  <style>
    .panel {
      max-width: 980px;
      margin: 2rem auto;
      padding: 1.5rem;
    }

    .panel__header h2 {
      margin: 0 0 0.4rem 0;
    }

    .tool-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      justify-content: space-between;
      margin-top: 1rem;
    }

    .pixel-btn {
      font-family: var(--font-main);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.7rem 1.2rem;
      border: 3px solid #000;
      border-radius: 10px;
      background: linear-gradient(#ff4dd8, #a31977);
      color: #ffeefc;
      text-shadow: 1px 1px #000;
      box-shadow: 0 3px 0 #000, 0 0 0 2px #fff inset;
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
      user-select: none;
    }
    .pixel-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #000, 0 0 0 2px #fff inset;
    }

    .hint {
      font-family: var(--font-body);
      opacity: 0.9;
      font-size: 1.05rem;
      margin: 0.4rem 0 0 0;
    }

    .canvas-wrap {
      margin-top: 1.2rem;
      background: rgba(0,0,0,0.55);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 0 18px rgba(255, 77, 216, 0.28), inset 0 0 12px rgba(255, 77, 216, 0.15);
      position: relative;
    }

    canvas#maizCanvas {
      width: 100%;
      height: 520px;
      display: block;
      border-radius: 10px;
      background: radial-gradient(circle at 50% 35%, rgba(255,77,216,0.18), rgba(0,0,0,0.15) 55%, rgba(0,0,0,0.35));
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      pointer-events: none;
      transform: translate(12px, 12px);
      background: rgba(0,0,0,0.88);
      border: 2px solid rgba(255,77,216,0.6);
      color: #f4e9ff;
      padding: 0.7rem 0.8rem;
      border-radius: 10px;
      box-shadow: 0 0 16px rgba(255,77,216,0.25);
      font-family: var(--font-body);
      font-size: 0.95rem;
      line-height: 1.25;
      max-width: 320px;
      display: none;
      z-index: 5;
    }

    .tooltip b { color: var(--accent); }

    .filebox {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    input[type="file"]{
      font-family: var(--font-body);
      color: #f4e9ff;
    }

    @media (max-width: 600px) {
      canvas#maizCanvas { height: 440px; }
      .pixel-btn { font-size: 0.55rem; padding: 0.6rem 0.9rem; }
    }
  </style>
</head>

<body>
  <canvas class="scanline" aria-hidden="true"></canvas>

  <header class="hero">
    <div class="hero__content">
      <p class="hero__tag">&gt; maíz criollo vivo</p>
      <h1 class="hero__title">Genoma en mazorca</h1>
      <div class="hero__nav">
        <a href="index.html#inicio" class="a--back boton-sonido">Volver al inicio</a>
      </div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel__header">
        <h2 id="title">SRR35792142 — Maíz (México)</h2>
        <p class="hint" id="subtitle">Pasa el mouse sobre una letra para ver info. Haz click para “fijar” el tooltip.</p>
      </div>

      <div class="tool-row">
        <div class="filebox">
          <span class="hint">Cargar FASTQ (demo local):</span>
          <input id="fastqInput" type="file" accept=".fastq,.fq,.txt" />
          <button class="pixel-btn boton-sonido" id="btnDemo">Demo (secuencia fake)</button>
        </div>
        <button class="pixel-btn boton-sonido" id="btnRespawn">Re-sembrar mazorca</button>
      </div>

      <div class="canvas-wrap" id="wrap">
        <canvas id="maizCanvas"></canvas>
        <div class="tooltip" id="tooltip"></div>
      </div>
    </section>
  </main>

  <script>
    // =========================
    // 0) Metadata base del dataset (edítalo a tu gusto)
    // =========================
    const MAIZ_META = {
    project: "PRJNA1345371",
    title: "Diversity within a Mexican maize: Olotillo",
    objective: "Characterize the genetic diversity within a Mexican maize race.",
    institute: "UNAM, Instituto de Biología",
    relevance: "Agricultural",
    scope: "Multispecies",
    data_volume_gbases: 1,
    data_volume_mbytes: 288,
    grants: [
      'PAPIIT IN222123 (DGAPA, UNAM)',
      'CONABIO-PGM (Proyecto Global de Maíces Nativos)'
    ],
    note: "Hover para ver base/posición y metadata del proyecto."
    };

    // =========================
    // 1) Canvas setup
    // =========================
    const canvas = document.getElementById("maizCanvas");
    const wrap = document.getElementById("wrap");
    const tooltip = document.getElementById("tooltip");
    const ctx = canvas.getContext("2d");

    function resizeCanvasToCSS() {
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", () => {
      resizeCanvasToCSS();
      buildMaizLayout();
      render();
    });

    // =========================
    // 2) Generación de “kernels” (letras) en forma de mazorca
    //    Guardamos bounding boxes para hover
    // =========================
    let sequence = "";          // cadena A/C/G/T
    let kernels = [];           // {x,y,ch,idx,w,h,meta}
    let hovered = null;         // kernel hovered
    let pinned = false;         // tooltip fijo por click

    function randomDNA(n) {
      const b = ["A","C","G","T"];
      let s = "";
      for (let i=0;i<n;i++) s += b[(Math.random()*4)|0];
      return s;
    }

    // Silueta: una elipse (mazorca) + rejilla de puntos adentro
    function buildMaizLayout() {
    kernels = [];

    const W = canvas.getBoundingClientRect().width;
    const H = canvas.getBoundingClientRect().height;

    // Centro de la mazorca (un poco arriba)
    const cx = W * 0.52;
    const cy = H * 0.48;

    // Alto/Ancho "cob"
    const cobH = H * 0.62;     // altura mazorca
    const cobWmax = W * 0.24;  // ancho máximo (arriba/centro)

    // Densidad (más granos)
    const stepY = Math.max(14, Math.floor(H / 38));
    const stepX = Math.max(12, Math.floor(W / 70));

    ctx.font = "20px VT323";
    const fontH = 20;
    const charW = 11;

    // Función de "taper": ancho por fila (0 arriba -> 1 abajo)
    // Mazorca: más ancha en el tercio superior y se afila al final
    function widthAt(t) {
      // t: 0..1
      // curva: ancha al inicio y se afila
      const bulge = Math.sin(Math.PI * Math.min(1, t * 1.05)); // 0..1..0
      const topBias = 0.75 + 0.25 * Math.cos(Math.PI * t);     // favorece arriba
      const w = cobWmax * (0.18 + 0.82 * bulge * topBias);
      return w;
      }

    // Recorremos filas de arriba a abajo
    const yTop = cy - cobH * 0.5;
    const yBot = cy + cobH * 0.5;

    let idx = 0;

    for (let y = yTop; y <= yBot; y += stepY) {
      const t = (y - yTop) / (yBot - yTop); // 0..1
      const halfW = widthAt(t);

      const xStart = cx - halfW;
      const xEnd = cx + halfW;

      // Zigzag para dar apariencia de granos
      const row = Math.floor((y - yTop) / stepY);
      const offset = (row % 2) ? (stepX * 0.5) : 0;

      for (let x = xStart + offset; x <= xEnd; x += stepX) {
        const ch = sequence[idx % sequence.length] || "A";

        // El borde inferior lo hacemos más "cónico": filtramos puntos cerca de la punta
        // Para que no quede cuadrado.
        const tipT = Math.max(0, (t - 0.78) / 0.22); // solo en el último 22%
        const tipShrink = 1 - tipT;                  // 1 -> 0
        const dx = Math.abs(x - cx);
        if (t > 0.78 && dx > halfW * tipShrink) continue;

          const meta = {
          ...MAIZ_META,
          base: ch,
          pos: idx + 1
        };

        kernels.push({ x, y, ch, idx, w: charW, h: fontH, meta });

        idx++;
        if (idx > 4200) break; // más letras = más “mazorca”
      }
      if (idx > 4200) break;
    }
  }

    // =========================
    // 3) Render
    // =========================
    function drawBackground(W, H) {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.10)";
      ctx.fillRect(0, 0, W, H);

      // Parámetros base para hojas
      const cx = W * 0.52;
      const cy = H * 0.50;
      const cobH = H * 0.62;
      const cobW = W * 0.24;

      // Hojas (totomoxtle) izquierda y derecha (polígonos suaves)
      ctx.globalAlpha = 0.28;
      ctx.fillStyle = "rgba(64,211,90,0.95)";

      // Hoja izquierda
      ctx.beginPath();
      ctx.moveTo(cx - cobW * 0.45, cy + cobH * 0.20);
      ctx.quadraticCurveTo(cx - cobW * 1.30, cy + cobH * 0.05, cx - cobW * 0.85, cy - cobH * 0.10);
      ctx.quadraticCurveTo(cx - cobW * 0.35, cy - cobH * 0.22, cx - cobW * 0.10, cy - cobH * 0.10);
      ctx.quadraticCurveTo(cx - cobW * 0.55, cy + cobH * 0.05, cx - cobW * 0.45, cy + cobH * 0.20);
      ctx.closePath();
      ctx.fill();

      // Hoja derecha
      ctx.beginPath();
      ctx.moveTo(cx + cobW * 0.45, cy + cobH * 0.20);
      ctx.quadraticCurveTo(cx + cobW * 1.30, cy + cobH * 0.05, cx + cobW * 0.85, cy - cobH * 0.10);
      ctx.quadraticCurveTo(cx + cobW * 0.35, cy - cobH * 0.22, cx + cobW * 0.10, cy - cobH * 0.10);
      ctx.quadraticCurveTo(cx + cobW * 0.55, cy + cobH * 0.05, cx + cobW * 0.45, cy + cobH * 0.20);
      ctx.closePath();
      ctx.fill();

      // “Tallo” abajo
      ctx.globalAlpha = 0.40;
      ctx.fillRect(cx - cobW * 0.12, cy + cobH * 0.45, cobW * 0.24, cobH * 0.20);

      // Contorno suave de la mazorca (ayuda a leer forma)
      ctx.globalAlpha = 0.20;
      ctx.strokeStyle = "rgba(255,77,216,0.65)";
      ctx.lineWidth = 2;

      // contorno tipo gota
      ctx.beginPath();
      const yTop = cy - cobH * 0.5;
      const yBot = cy + cobH * 0.5;
      for (let i = 0; i <= 70; i++) {
        const t = i / 70;
        const y = yTop + t * (yBot - yTop);

        const bulge = Math.sin(Math.PI * Math.min(1, t * 1.05));
        const topBias = 0.75 + 0.25 * Math.cos(Math.PI * t);
        const halfW = cobW * (0.18 + 0.82 * bulge * topBias);

        const x = cx - halfW;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      for (let i = 70; i >= 0; i--) {
        const t = i / 70;
        const y = yTop + t * (yBot - yTop);

        const bulge = Math.sin(Math.PI * Math.min(1, t * 1.05));
        const topBias = 0.75 + 0.25 * Math.cos(Math.PI * t);
        const halfW = cobW * (0.18 + 0.82 * bulge * topBias);

        const x = cx + halfW;
        ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
       ctx.restore();
      }

    function render() {
      const W = canvas.getBoundingClientRect().width;
      const H = canvas.getBoundingClientRect().height;

      ctx.clearRect(0,0,W,H);
      drawBackground(W, H);

      // título mini HUD
      ctx.save();
      ctx.font = "16px 'Press Start 2P'";
      ctx.fillStyle = "rgba(244,233,255,0.85)";
      ctx.fillText("MAÍZ CRIOLLO // ADN", 18, 34);
      ctx.restore();

      // kernels
      ctx.save();
      ctx.font = "18px VT323";

      for (const k of kernels) {
        const isHover = hovered && hovered.idx === k.idx;

        // color: base -> acento / blanco
        // (sin hardcode de paleta complicada para que se sienta “neón” por el CSS general)
        ctx.fillStyle = isHover ? "rgba(255,77,216,1)" : "rgba(244,233,255,0.9)";

        // glow sutil
        if (isHover) {
          ctx.shadowColor = "rgba(255,77,216,0.8)";
          ctx.shadowBlur = 10;
        } else {
          ctx.shadowColor = "rgba(255,77,216,0.25)";
          ctx.shadowBlur = 2;
        }

        // “respirar” un poco (animación leve)
        const t = performance.now() * 0.001;
        const wobble = 1.2 * Math.sin(t + k.idx * 0.02);

        ctx.fillText(k.ch, k.x, k.y + wobble);
      }

      ctx.restore();
    }

    // =========================
    // 4) Hover detection + tooltip
    // =========================
    function getMousePos(evt) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: evt.clientX - rect.left,
        y: evt.clientY - rect.top
      };
    }

    function hitTest(mx, my) {
      // búsqueda rápida: checar cerca (sin estructura espacial por simplicidad)
      // Si luego quieres ultra fluido, hacemos grid indexing.
      let best = null;
      let bestD = Infinity;

      for (const k of kernels) {
        const dx = mx - k.x;
        const dy = my - k.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < bestD && d2 < 140) { // radio de selección
          bestD = d2;
          best = k;
        }
      }
      return best;
    }

    function showTooltip(k, evt) {
      const m = k.meta;
      tooltip.innerHTML = `
        <div><b>${m.base}</b> <span style="opacity:.85">pos ${m.pos}</span></div>

        <div style="margin-top:.45rem; opacity:.95">
          <div><b>Proyecto:</b> ${m.project}</div>
          <div><b>Título:</b> ${m.title}</div>
          <div><b>Institución:</b> ${m.institute}</div>
          <div><b>Relevancia:</b> ${m.relevance}</div>
          <div><b>Volumen:</b> ${m.data_volume_gbases} Gbases (${m.data_volume_mbytes} MB)</div>
        </div>

        <div style="margin-top:.45rem; opacity:.9">
          <b>Grants:</b>
          <div style="opacity:.85">• ${m.grants?.[0] || ""}</div>
          <div style="opacity:.85">• ${m.grants?.[1] || ""}</div>
        </div>

        <div style="margin-top:.45rem; opacity:.8">${m.note || ""}</div>
        `;
        
      tooltip.style.display = "block";

      // posicionar relativo al contenedor
      const wrapRect = wrap.getBoundingClientRect();
      tooltip.style.left = (evt.clientX - wrapRect.left) + "px";
      tooltip.style.top  = (evt.clientY - wrapRect.top) + "px";
    }

    function hideTooltip() {
      tooltip.style.display = "none";
    }

    canvas.addEventListener("mousemove", (evt) => {
      if (pinned) {
        // si está fijado, solo movemos el tooltip con el mouse si quieres:
        const wrapRect = wrap.getBoundingClientRect();
        tooltip.style.left = (evt.clientX - wrapRect.left) + "px";
        tooltip.style.top  = (evt.clientY - wrapRect.top) + "px";
        return;
      }

      const {x,y} = getMousePos(evt);
      const k = hitTest(x,y);

      hovered = k;
      render();

      if (k) showTooltip(k, evt);
      else hideTooltip();
    });

    canvas.addEventListener("mouseleave", () => {
      if (!pinned) hideTooltip();
      hovered = null;
      render();
    });

    canvas.addEventListener("click", (evt) => {
      if (!hovered) return;
      pinned = !pinned;
      if (pinned) showTooltip(hovered, evt);
    });

    // =========================
    // 5) Anim loop
    // =========================
    function loop() {
      render();
      requestAnimationFrame(loop);
    }

    // =========================
    // 6) Cargar secuencia desde FASTQ (demo local) o usar demo
    // =========================
    function parseFastqFirstN(text, maxReads=200, maxBases=2500) {
      // FASTQ: 4 líneas por read
      // 1: @id
      // 2: SEQ
      // 3: +
      // 4: QUAL
      const lines = text.split(/\r?\n/);
      let seq = "";
      let reads = 0;

      for (let i=0; i+3 < lines.length; i+=4) {
        const s = (lines[i+1] || "").trim();
        if (!s) continue;
        seq += s;
        reads++;
        if (reads >= maxReads) break;
        if (seq.length >= maxBases) break;
      }

      // filtrar solo A/C/G/T/N -> aquí quitamos N para el arte
      seq = seq.toUpperCase().replace(/[^ACGT]/g, "");
      if (seq.length < 100) seq = randomDNA(1200);
      return seq.slice(0, maxBases);
    }

    const fastqInput = document.getElementById("fastqInput");
    fastqInput.addEventListener("change", async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;

      // Leemos solo un pedazo del archivo para no matar el navegador
      const chunk = file.slice(0, 2_000_000); // 2MB
      const text = await chunk.text();

      sequence = parseFastqFirstN(text, 250, 2600);
      resizeCanvasToCSS();
      buildMaizLayout();
      pinned = false;
      hideTooltip();
      hovered = null;
      render();
    });

    document.getElementById("btnDemo").addEventListener("click", () => {
      sequence = randomDNA(2600);
      resizeCanvasToCSS();
      buildMaizLayout();
      pinned = false;
      hideTooltip();
      hovered = null;
      render();
    });

    document.getElementById("btnRespawn").addEventListener("click", () => {
      // re-ordena la “siembra” sin cambiar secuencia
      if (!sequence) sequence = randomDNA(2600);
      buildMaizLayout();
      pinned = false;
      hideTooltip();
      hovered = null;
      render();
    });

    // =========================
    // init
    // =========================
    sequence = randomDNA(2600);
    resizeCanvasToCSS();
    buildMaizLayout();
    loop();
  </script>

  <script src="/kittie/scripts/sonidos.js"></script>
</body>
</html>
